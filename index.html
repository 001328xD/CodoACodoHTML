<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Ingreso</title>
</head>
<body>
    <form action="/verificarCuenta.html" method="POST">
        <table>
            <tr>
                <th colspan="2" style="text-align: center;">Acceso al Sistema</th>
            </tr>
            <tr>
             <td><label for="dni">DNI:</label></td>
             <td><input type="text" id="dni" name="dni" pattern="[0-9]*" placeholder="Ingrese DNI sin puntos." maxlength="8" minlength="7" required></td>
            </tr>
            <tr>
                <td><label for="usuario">Usuario:</label></td>
                <td><input type="text" id="usuario" name="usuario" required></td>
            </tr>
            <tr>
                <td><label for="clave">Clave:</label></td>
                <td><input type="password" id="clave" name="clave" required></td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;"><input type="submit" value="Ingresar"></td>
            </tr>
        

        </table>  
    </form>  
</body>
</html>
